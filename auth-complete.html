<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang đăng nhập...</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#f5f5f7;font-family:system-ui,-apple-system,sans-serif" class="min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 w-full max-w-sm text-center" style="border-radius:18px;border:1px solid #e0e0e0">

    <!-- Đang xác thực -->
    <div id="loading">
      <h2 class="text-lg font-semibold" style="color:#1d1d1f;letter-spacing:-0.374px">Đang xác thực Zalo...</h2>
      <p class="mt-1 text-sm" style="color:#7a7a7a">Vui lòng chờ trong giây lát</p>
      <div class="mt-6 flex justify-center gap-2">
        <div class="w-2 h-2 rounded-full animate-bounce" style="background:#0066cc"></div>
        <div class="w-2 h-2 rounded-full animate-bounce [animation-delay:0.15s]" style="background:#0066cc"></div>
        <div class="w-2 h-2 rounded-full animate-bounce [animation-delay:0.3s]" style="background:#0066cc"></div>
      </div>
    </div>

    <!-- Đang chờ admin duyệt -->
    <div id="waiting" class="hidden">
      <img id="waitingAvatar" src="" alt="" class="w-16 h-16 rounded-full mx-auto mb-3 object-cover" style="border:2px solid #e0e0e0" />
      <h2 class="text-base font-semibold" style="color:#1d1d1f;letter-spacing:-0.374px" id="waitingName"></h2>
      <div class="mt-4 mb-2 inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium" style="background:#fff8ec;color:#b45309;border:1px solid #fde68a">
        <span class="w-2 h-2 rounded-full animate-pulse inline-block" style="background:#f59e0b"></span>
        Đang chờ admin phê duyệt
      </div>
      <p class="mt-3 text-sm" style="color:#7a7a7a">Yêu cầu đã được gửi đến quản trị viên.<br>Trang sẽ tự cập nhật khi được duyệt.</p>
      <p class="mt-3 text-xs" style="color:#aaa" id="waitingTimer">Đang kiểm tra...</p>
      <button onclick="window.location.href='/login.html'" class="mt-6 text-sm" style="color:#0066cc">
        ← Quay về đăng nhập
      </button>
    </div>

    <!-- Lỗi -->
    <div id="error" class="hidden">
      <div class="text-red-500 text-4xl">✗</div>
      <h2 class="mt-4 text-lg font-semibold" style="color:#1d1d1f">Đăng nhập thất bại</h2>
      <p id="errorMsg" class="mt-2 text-sm" style="color:#7a7a7a"></p>
      <a href="/login.html" class="mt-6 inline-block text-white px-6 py-3 font-semibold text-sm"
         style="background:#0066cc;border-radius:9999px;letter-spacing:-0.374px">
        Thử lại
      </a>
    </div>

  </div>

  <script>
    const ZALO_APP_ID = "3321804211495068656";

    let pollInterval = null;
    let pollCount    = 0;

    function showSection(id) {
      ["loading", "waiting", "error"].forEach(s => {
        document.getElementById(s).classList.toggle("hidden", s !== id);
      });
    }

    function showError(msg) {
      showSection("error");
      document.getElementById("errorMsg").textContent = msg;
    }

    function showWaiting(user) {
      const avatar = document.getElementById("waitingAvatar");
      if (user.picture) {
        avatar.src = user.picture;
        avatar.style.display = "block";
      } else {
        avatar.style.display = "none";
      }
      document.getElementById("waitingName").textContent = user.name;
      showSection("waiting");
      startPolling();
    }

    // ── Polling: kiểm tra mỗi 5 giây xem admin đã duyệt chưa ─────────────
    function startPolling() {
      pollInterval = setInterval(async () => {
        pollCount++;
        const elapsed = pollCount * 5;
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        document.getElementById("waitingTimer").textContent =
          `Đã chờ ${mins > 0 ? mins + " phút " : ""}${secs} giây...`;

        try {
          const res  = await fetch("/api/auth/status");
          const data = await res.json();

          if (data.ok) {
            clearInterval(pollInterval);
            window.location.replace("/index.html");
          } else if (data.status === "denied") {
            clearInterval(pollInterval);
            showError("Yêu cầu của bạn đã bị từ chối. Vui lòng liên hệ quản trị viên.");
          }
          // "pending" → tiếp tục chờ
        } catch (e) {
          // Lỗi mạng → tiếp tục chờ
        }
      }, 5000);
    }

    async function run() {
      const params   = new URLSearchParams(location.search);
      const code     = params.get("code");
      const verifier = params.get("verifier");
      const sid      = params.get("sid");

      if (!code || !verifier || !sid) {
        showError("Thiếu tham số xác thực. Vui lòng thử lại.");
        return;
      }

      // ── Bước 1: Đổi code → access token ──────────────────────────────────
      let tokenData;
      try {
        const tokenRes = await fetch("https://oauth.zaloapp.com/v4/access_token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            app_id:        ZALO_APP_ID,
            code,
            code_verifier: verifier,
            grant_type:    "authorization_code",
          }),
        });

        const raw = await tokenRes.text();
        try { tokenData = JSON.parse(raw); }
        catch { showError("Zalo trả về lỗi không hợp lệ: " + raw.slice(0, 100)); return; }

        if (tokenData.error || !tokenData.access_token) {
          showError("Lỗi lấy token: " + (tokenData.error_description || tokenData.message || JSON.stringify(tokenData)));
          return;
        }
      } catch (err) {
        showError("Không kết nối được Zalo: " + err.message);
        return;
      }

      // ── Bước 2: Lấy thông tin profile (bao gồm phone nếu có) ─────────────
      let user;
      try {
        const profileRes = await fetch(
          "https://graph.zalo.me/v2.0/me?fields=id,name,picture,phone",
          { headers: { access_token: tokenData.access_token } }
        );

        const profileData = await profileRes.json();

        if (profileData.error || !profileData.id) {
          showError("Không lấy được thông tin Zalo: " + (profileData.message || JSON.stringify(profileData)));
          return;
        }

        user = {
          id:      profileData.id,
          name:    profileData.name || "Người dùng Zalo",
          picture: profileData.picture?.data?.url || profileData.picture || "",
          phone:   profileData.phone || "",
        };
      } catch (err) {
        showError("Lỗi lấy profile: " + err.message);
        return;
      }

      // ── Bước 3: Gửi user data về server ──────────────────────────────────
      try {
        const sessionRes = await fetch("/api/auth/session", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ sid, user }),
        });

        const data = await sessionRes.json();

        if (sessionRes.status === 202 && data.status === "pending") {
          // Chờ admin duyệt
          showWaiting(user);
          return;
        }

        if (!sessionRes.ok || data.error) {
          showError("Lỗi tạo session: " + (data.error || sessionRes.status));
          return;
        }
      } catch (err) {
        showError("Lỗi kết nối server: " + err.message);
        return;
      }

      // ── Thành công → chuyển về trang chính ───────────────────────────────
      window.location.replace("/index.html");
    }

    run();
  </script>
</body>
</html>
