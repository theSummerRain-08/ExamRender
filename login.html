<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập - AI Exam Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-md rounded-3xl shadow-xl p-10">

    <!-- logo -->
    <div class="flex flex-col items-center">

      <div class="w-20 h-20 rounded-3xl bg-indigo-600 text-white flex items-center justify-center text-3xl font-bold shadow-lg">
        AI
      </div>

      <h1 class="mt-6 text-3xl font-bold text-slate-800">
        AI Exam Generator
      </h1>

      <p class="mt-3 text-slate-500 text-center leading-relaxed">
        Tạo đề thi Toán bằng AI và nhận PDF trực tiếp qua Zalo
      </p>

    </div>

    <!-- features -->
    <div class="mt-10 space-y-4">

      <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
        <div class="text-green-500 text-xl">✓</div>
        <p class="text-sm text-slate-700">
          Sinh đề tự động bằng AI
        </p>
      </div>

      <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
        <div class="text-green-500 text-xl">✓</div>
        <p class="text-sm text-slate-700">
          Xuất PDF đẹp chuẩn đề thi
        </p>
      </div>

      <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
        <div class="text-green-500 text-xl">✓</div>
        <p class="text-sm text-slate-700">
          Gửi đề trực tiếp qua Zalo
        </p>
      </div>

    </div>

    <!-- login button -->
    <button
      id="loginBtn"
      class="w-full mt-10 bg-blue-600 hover:bg-blue-700 transition text-white py-4 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3">

      <svg xmlns="http://www.w3.org/2000/svg"
           width="22"
           height="22"
           fill="currentColor"
           viewBox="0 0 16 16">

        <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0Zm3.5 10.5H4.7V9h4.1L4.5 5.5h2L10 9V5.5h1.5v5Z"/>
      </svg>

      Đăng nhập bằng Zalo

    </button>

    <p class="text-xs text-slate-400 text-center mt-6 leading-relaxed">
      Khi đăng nhập bạn đồng ý với điều khoản sử dụng và chính sách bảo mật
    </p>

  </div>

  <script>

    const loginBtn = document.getElementById('loginBtn');

    loginBtn.addEventListener('click', () => {
      window.location.href = '/api/auth/zalo';
    });

  </script>

</body>
</html>
